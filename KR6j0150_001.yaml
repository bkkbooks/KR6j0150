常擁護他人及自護身所求財寶稱意者常起善心心不散亂每日每時於佛像前結印誦真言七遍瞻仰觀佛面目不動如此作法即得種種福祿充足命終之後必有福報不墮惡趣第二十三法者若有女人欲求男女子者於一百日辦香美飲食乞與貧病人喫施食之時口常誦真言念念不絶如此作法必獲福德男女兒子第二十四法者若有夫婦相憎者將絹帛誦真言加持二十一遍即將作衣與夫壻者即便得和順第二十五法者若有女人嫁娶不結者取好淨鹽不限多少誦真言加持二十一遍施與現前僧喫即便女得嫁處第二十六者若有外道及國王王子大臣百官等不信佛法者取無瘡瘢黃乳牛三頭誦真言加持水草二十一遍與牛食之日欲出時即將取乳以銀器盛之又誦真言加持乳二十一遍即於四方淨地寫之其將乳人須著白衣口云乾闥婆兒善住及天王帝釋今有此事當自處分行者當即入城見國王王子大臣百官及諸外道不信佛法人等見此行者深生歡喜行者所說悉皆信受得信之心無有改動第二十七法者若有人所在處界內所有惡鬼神惡鬼毒龍等行者欲得降伏者取牛乳加持二十一遍即寫著有龍水中若有龍出來行者語言汝莫損此界內衆生即令依舊安置龍若薄媚不出來惡業不息者即誦真言加持沙二十一遍散於池中即得池平如地行者別將龍向餘處安置遣令得所行者即更加持二十一遍莫遣東西其惡鬼神加持飲食二十一遍以施之行者告言我今語汝若不損害衆生任汝住此若擬損害衆生即須出去其鬼神薄媚不受處分者即此作鐵𣐍長十二指以真言加持二十一遍即釘入地惡鬼神即散出走去行者仍安置鬼神遣令得所又告言一如處分不得東西第二十八法者行者每欲出行之時常作一白拂誦真言加持一百八遍手常持行若逢諸類一切畜生等皆拂之一遍即得畜生惡業離苦解脫第二十九法者若欲令先亡離苦解脫者行者當於尸陀林中安坐七日日別三時誦真言任意多少滿七日已即取行者坐處土散之時亡者即得離苦解脫悉得生天永離惡道第三十法者若有人顧賣不售所求不稱意者行者為結印誦真言二十一遍安置善住形像於密處供養即得所求顧賣稱意第三十一法者若有人欲入山林逢師子虎狼毒蛇惡獸等者欲入之時預於山前誦真言二十一遍加持黃土七遍即取上土口含之數數訶氣入於山中口云於此山中惡毒禽狩等所有惡毒氣悉皆消滅此地屬我若能依我法行者任聽汝住若不能依我法行者即須急出若不出者口即閉塞開口不得行者見虎狼禽狩等開口不得即須急出若不出者行者見虎狼禽狩口開即須集之一處以右手摩挲其頭上加持二十一遍行者口云我和上令開汝口即放出界外守護地勿令傷損此界內一切衆生行者發遣乃已仍須安置令遣得所行者常坐山中二月餘日更不得住即須且東西去已後更來坐若其久住諸禽狩等即不得安隱第三十二法者若山中有慳鬼神慳龍等不許行者於山中隱逸者行者知見此事即依法處分者行者口云我樂此地乞汝與我若不與我當共汝住若不許者儞即須出去於三百由旬外安置若其薄媚不受諫勸者我即禁繫汝不令東西行者即以鐵杵長十二指加持一百八遍用釘住處門首即令諸惡禽狩等於一百由旬內住止安穩第三十三法者若有諸龍被外道等禁繫致令國中無雨行者當於有龍水泉邊作一小壇以桑木作橛八箇安於壇中又以乳酪三碗亦安壇上總加持乳𣐍等一百八遍即以木𣐍釘泉水四邊八處又以乳酪寫於池中又以金薄葉加持著荷葉上著泉中行者口云善知識今有厄難被諸外道禁繫今此作法已訖以陀羅尼護汝發遣收領其荷葉與真言沒水去行者訶氣三遍外道禁法即便破壞其龍即得解脫無難其龍當即出來供養行者龍口云曹主有何處分行者口云汝可每依時興雲致雨將此陀羅尼頂上安置令汝等永得無難第三十四法者若有大水泛漲損傷人者即誦真言加持水二十一遍將投大水中更不泛溢尊勝佛頂真言修瑜伽畫像品第七復次我今更說修瑜伽速證有相無相悉地準例內外有異外相法者先須畫像擇取吉善好月時日晨朝起畫好月者正二三四五六七十二月等此為最上好月好日者日月蝕時及地動時鬼宿日此為上好勝日或取白月十五日或取二十三日等已擇取日月時節喚畫師沐浴與三昧耶戒或與三昧耶灌頂每出入洗浴換衣食三白食不雜穢食等亦不還價其畫物白氈或好細布絹等物中如法畫之一依圖上如左其所畫布絹㲲等大小隨意中心畫大圓明白色又大圓明分為九圓八方置寶瓶於瓶口中插以名華上置三股嚩折羅中心圓外四隅安四寶輪皆以嚩折囉相拄寶瓶及嚩折囉腰纏綵帶垂之中圓畫毗蘆遮那如來頭戴五佛冠種種寶華光於七師子座上結跏趺坐手結法界印左圓明中畫白傘蓋佛頂輪王頭戴五智冠左手執蓮華於蓮華上安置白傘蓋右手揚掌半跏趺坐其身光及頭光如五色車輪形右圓明中畫最勝佛頂輪王頭戴五智冠種種莊嚴背圓光及以通身光狀如車輪具種種色右手持蓮華於蓮華上安八輻寶輪具種種色光焰圓繞於蓮華上結跏趺坐左手揚掌中圓明前畫尊勝佛頂亦名除障佛頂輪王於蓮華臺上結跏趺坐白肉色兩手臍下如入禪定掌中承蓮華於蓮華上金剛鉤如上頂輪王等種種光明五智冠等一依瑜伽圖皆於白蓮華座結跏趺坐大日如來後圓中畫放光佛頂或名光聚佛頂輪王左執蓮華於華臺上畫佛頂印於佛頂上放光五智寶冠光明等一如上說右手揚掌其尊勝佛頂左邊圓明中畫勝佛頂左手執劍右手揚掌五佛冠種種莊嚴輪光明中亦如上說其尊勝佛頂右畫廣生佛頂王右手持嚩折囉左手揚掌五智冠輪光焰瓔珞等一依上諸尊等例光聚佛頂右圓明中畫無邊聲佛頂王右手持蓮華於蓮華臺上畫商佉左手當嬭房上揚掌五佛冠輪光莊嚴等隨意種種莊嚴光聚左圓明中畫發生佛頂王左手執開蓮華右手右膝上半跏趺坐輪光瓔珞同如上說皆大仁慈悲相下左邊畫降三世尊於半月輪邪立走勢青色拘牙上出四手兩手結三昧耶印一手結心印一手執縛折囉右邊三角赤光中畫無動尊於盤石上半跏趺坐一目怒出一目合咬下脣一邊反出赤髮交鎖垂下左邊身復肥滿如童子形右手把劍左手執索兩明王中間修瑜伽者坐前香爐其像上畫寶蓋兩邊畫六箇乘雲首陀會天童子形半身涌出各執香華寶鬘等一依如上圖或如外觀像法修瑜祇者觀己身為毗盧遮那法身周遍法界同一體相更無異相我今略說觀像及畫法則已竟凡欲作法受持佛頂尊勝陀羅尼神呪者先須畫像畫像法者取好絹或用白㲲絹用三幅高一丈彩色中勿用皮膠須用香膠畫師須清淨不喫熏辛從黑月一日起首畫像滿七日即須造了當畫作甘露山山中作種種樹林華果流泉鳥獸山中作禪窟窟內作釋迦牟尼佛結跏趺坐佛右邊作天主帝釋一切眷屬圍繞左作乾闥婆兒名曰善住容貌端嚴如似菩薩頭髮衣冠亦復如是以種種瓔珞華冠莊嚴又以白㲲巾斜勒左肩上右手把毬杖又作乾闥婆眷屬圍繞善住歌舞作樂佛左右各作兩箇四天王及其眷屬又於佛左邊作大梵天王并魔王畫像了已即須作壇受法作壇法者先覓淨地勿令有瓦石以五種香湯和淨土作泥泥地方一丈又作壇中心方圓一肘內作一佛頂青色於壇四面外各安飲食面別七盆四方各置一具香爐燒衆名香南門安一銅瓶瓶中盛香水安帝釋坐處東門安乾闥婆兒善住坐處於西門呪師自坐面向東方佛像面向西方又以五色綵帛作幡懸壇場外四邊又安五盞燈一盞處中高著四盞四角下著如似塔形壇場內散諸雜華供養物等並於壇外四面安置勿於壇內七日之中於道場內誦呪數須滿一萬遍訖佛頂放大光明呪師七日之內須數數發露懺悔起大慈悲發弘誓願永不退轉當爾之時即知法成更莫疑慮曩謨婆去引誐縛帝引怛賴二合路引枳也二合鉢羅二合底尾始瑟吒野沒馱引野婆去誐嚩帝引怛儞也二合他引唵引尾戍馱野尾戍馱野娑麼娑麼三去滿跢去引縛婆去引娑娑頗二合羅拏誐底誐賀曩娑嚩二合婆去引嚩尾秫第阿上詵鼻左覩𤚥素誐哆嚩羅嚩左曩引阿密嘌二合哆鼻矖罽平摩賀引曼怛囉二合跋乃引阿去引賀羅阿賀羅阿去引臾散馱引囉抳戍引馱耶戍馱耶誐誐曩尾秫第塢瑟抳二合灑野上尾惹野尾秫第娑賀娑囉囉濕茗二合散祖儞帝薩囉嚩二合怛他去引誐多嚩路引迦𩕳娑上吒幡二合囉弭哆去引跛里布引羅抳薩嚩二合怛他去引誐哆紇哩二合娜野地瑟姹二合曩地瑟耻二合多摩賀引母捺哩嚩日囉二合迦野僧賀多上曩尾秫第薩羅嚩二合引嚩囉拏鼻引播野訥蘖底跛哩尾秫弟鉢羅二合底𩕳襪囉哆二合野阿去引欲秫第三麼野引地瑟恥二合帝麼抳摩抳摩賀摩抳怛闥去引哆部多句引致跛哩秫第尾娑普二合吒沒地秫第惹野惹野尾惹野尾惹野娑麼羅娑麼羅薩嚩沒引馱地瑟恥二合多秫第嚩日哩嚩日囉二合引蘖陛嚩日覽二合婆嚩都麼麼某甲設哩覽薩羅嚩二合薩怛縛二合難左迦野跛哩尾秫第薩嚩二合誐底跛哩秫第薩羅嚩二合怛他蘖哆去引室者二合銘三去麼引濕二合引嚩平沙琰覩薩囉嚩二合怛他蘖多三麼鼻濕嚩沙去引地瑟恥二合帝沒地野二合沒地野二合尾沒地野尾沒地野冒馱野冒馱野尾沒馱尾沒馱野三滿跢跛里秫第薩羅嚩二合怛他蘖多紇哩二合娜野地瑟姹曩地瑟恥二合多摩賀母捺哩二合娑嚩二合賀􅁤􅋎􅞣􅞣􅞤􅖱􅋌􅋌􅞣􅝗􅞣􅞣􅞣􅞣􅞣􅁥
