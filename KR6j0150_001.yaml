body:
  text: 三藏善無畏尊勝真言序品第一稽首一切薄伽梵及以東方金剛部雄猛阿閦金剛藏寶生如來虛空寶達磨句攞無量壽觀自在王蓮華眼毗首羯磨大牟尼不空成就薩埵尊四波羅蜜四供養八大佛頂轉輪王為利一切修瑜祇速成尊勝大悉地樂修無相說瑜伽為求有相兼說相有無一體真大空是故我今修瑜伽文字觀照實相智三種般若無一體身口意業三密門應化法身即三密五輪即是五智輪五智便成五分身五輪盡攝法界輪三密即是三身故是故我今禮瑜伽瑜伽即是大日尊是故我今修瑜伽為利法界諸含識我今略說尊勝陀羅尼法即是除一切障滅一切地獄傍生等身故號尊勝佛頂之義是故如來為善住天子說除七遍畜生之身即此修瑜伽者不同事法若於一念頃證無生轉五智成五分法身悟三密即三身初發心時便越百六十種心度三無數劫行證普現色身三昧耶即是初發心時便成正覺是故我今為求有相者為說有相若求無相者兼說無相念誦之法雖說多種我今略說兩種盡攝一切一者為求世間除災增益等故略說有相之法二者為求無上菩提修瑜伽者即說無生頓入普現色身之法其世間念誦者略有四種所謂除災增益降伏攝召即是方圓三角半月曼荼羅等及護摩爐法即是四種念誦若增益念誦時每真言上下加娜莫二字若除災念誦時真言初後加以􅁥娑嚩二合賀二字若降伏念誦時加以吽泮吒二合三字若攝召念誦時每真言前後加以訶哩二合賀入二字即是除災增益降伏攝召增加句並稱所為者名字其色相者黃白赤青是或以面上及遍身衣服皆想本色所有供養香華塗末香并諸飲食黃白赤青香美淡辛等各依本法相應作之護摩等法各有殊異所有焚燒柴木等亦須臨時看取本法相應作之尊勝真言持誦法則品第二復次若欲作法念誦時先須入淨法界三摩地於頂上想有藍字三角智火形色如日初出時遍身為智火焚燒四大五蘊唯有空寂其法界真言曰娜摩三曼多勃馱喃㘕心念口誦想頂及遍體為三角智火形如上圖次即入五輪三摩地便入金剛輪三摩地觀己身臍已下方形紫金色為金剛輪便誦真言曰娜麼三曼多勃馱喃阿每字想時口誦並歸命心想本體字其形如圖阿字金剛輪黃色次觀臍中嚩字為大悲水輪色如商佉或如乳色形如滿月如圖在下鑁字水輪真言曰娜摩三曼多勃馱南鑁次說火輪真言曰那摩三曼多勃馱南㘕當心上觀三角火輪色如日初出時光焰猛利如劫火形其形如三角曼荼羅次想訶字大空點形如仰月黑色名含字即是天風輪安置於眉上靉靆如劫風次觀於頂上缺字大空輪具一切色種種衆形號為大空輪此名為五智輪謂地水火風空即以普通印加持五支即成真實智即說普通真言曰唵一薩婆他缺二嗢那蘗諦三薩叵囉醯䐽四伽伽那劍五莎嚩二合引賀引六次以定慧二手叉十輪頂戴及以加五支即成金剛不壞身即入三昧耶故即同一切諸佛菩薩三昧耶身作三昧耶身施作佛事先入三昧耶真言曰唵一嚩日囒二合二惹里三三麼野四每加印處並誦真言而加持之其手印相智定相叉齊輪合掌以智押禪此名一切佛心三昧耶印因作此印生一切印是故先作此印從三昧耶起即同從三昧加持五處頂及咽喉即名五支其五輪圖如左大空點具種種色名為缺字唅字風大藍字火大鑁字水大阿字地大金剛輪腰下大空輪頂上風輪眉上火輪心上水輪臍中一本無此圖也既去有為五蘊四大立無為金剛不壞五蘊即名無漏智身即無為曼荼羅地亦然其曼荼羅五輪加持名為地水火風空去有為五大立無為五大故先觀曼荼羅地相上時先從空起上觀風等如左圖以淨法界心先燒曼荼羅地中穢惡觸等然後依次第安立五大輪即以結界護身辟除光顯淨除三業堅固菩提心等是故復入金剛三昧耶真言及印真言曰唵一嚩日囉二合滿馱二怛囉二合吒三其手印相作前金剛掌印便合作拳置繫心上當繫心時散其合拳雙下三繫此名結金剛界印三繫心已由是真言及印力故能淨三業堅菩提心次於持誦處遣除穢濁及為障者凡獻香華塗香末香并諸供養辟除去垢發光增威作金剛界結諸方界護身及伴護居止處如上所說及有未詳臨事要須一一皆誦此真言作印護持能使成就無諸障難當以降三世真言及手印而加持各能成辦諸事等次誦降三世真言曰唵一寧上三婆二嚩日囉二合三𤙖四此名降三世尊言及手印名成辦諸事者其印相智定各為拳竪其風幢屈二大空輪入掌內以地水火三輪押之即成其印以定手印置在心上以智印用觸諸物及結地界四方乃至上下等界右轉三遍上下即成結界尊勝佛頂真言召請本尊等品第三復次應警覺諸佛及八大佛頂輪王或本部尊等從三昧耶起觀瞻愍念真言者故降赴道場所謂發生真言曰唵嚩日囉二合二底瑟吒二合三其手印相智定二手地輪鉤鎖相連其大空令入掌中以水輪及以火輪雙押空輪風幢向前相著以掌向上便誦真言以印從下發起諸尊是名發生之印次請本尊等真言手印發請真言曰唵一嚩日囉二合三芒二惹惹重急呼三其手印相以智定相叉作金剛拳不解此拳以智風輪撥智大空定手亦然如是三彈即成發請諸尊之法心想本尊所在之處建竪樓閣想其樓閣內有寶蓮華上觀大圓明內有九輪金剛界道每輪中本尊令坐圖如左其大圓明內分為九圓八寶瓶十二金剛杵四寶輪從八寶瓶口竪八金剛杵承四金剛輪從輪四面橫拄四金剛每瓶及金剛皆繼綵帶靉靆垂布大圓明內各坐九聖者中心大毗盧遮那如來頭戴五智寶冠坐七師子座上結跏趺坐結法界印自餘諸尊下曼荼羅品具明迎請真言曰唵一嚩日囒二合引俱捨二惹急重呼三其手印相用降三世印以二風輪舉作鉤形而動其鉤便成奉請既蒙來赴次應請入念誦道場請入真言曰唵一嚩日囉二合跛捨二吽三其手印相以金剛拳竪二地輪二空輪交結入掌右押左既奉請入作三昧耶依請而住請住真言曰唵一嚩日囉二合建吒二阿短急呼三其手印相作金剛拳竪二地輪二空輪交結入掌右押左請召乃至歡喜令其堅固故而誦真言堅固真言曰唵一薩囉嚩二合怛他蘗多二引毗三菩地三捺㗚二合荼四嚩日囉二合底瑟姹二合五其手印相智定相拍便成堅固次應灌沐本尊及己身灌頂真言曰唵一嚩日囉二合二諾迦咤去其手印相以其智手水輪空輪相捻餘輪並竪按誦水器想沐浴本尊灑印己身頂上奉獻閼伽想灌尊頂亦用此印拜誦真言七遍尊勝佛頂真言修瑜伽奉獻香華品第四次獻香華飲食燈火等以本真言誦持而用奉獻先奉燒香真言曰唵一嚩日羅二合二度弊三其手印相作金剛拳按其香上持誦真言經一七遍即成真實寶香遍滿十方虛空法界次奉獻華真言曰唵一嚩日囉二合二扶瑟二合弊三其手印相合金剛掌用印加持誦真言經一七遍即成真實寶華等次奉獻寶燈真言印真言曰唵一嚩日囉二合二地幣三其手印相作金剛拳竪二大空置於心上持誦真言經七遍便成寶燈遍虛空界次奉塗香真言曰唵一嚩日囉二合二誐度三其手印相智定覆掌散舒其輪以智大空押定空輪持誦真言經一七遍次當歸依三寶出罪懺悔隨喜功德勸請功德常住發菩提心讚歎佛德發勝上願其歸命三寶者願從今身乃至當坐菩提道場歸依如來無上三身歸依方廣大乘法藏歸依一切不退轉菩薩摩訶薩僧應當如是歸命三寶次應出罪懺悔者自從無始乃至今時煩惱覆源久流生死三種業障造罪無邊今日誠心發露懺悔惟當廣懺悔令使罪除次應發菩提心者始從今日乃至當坐菩提道場誓發無上大菩提道心誓度無量諸有情類願皆令離生死大苦今所發心復當遠離我法二相我法平等無自性故應當如是發菩提心以真言加持令菩提心堅固不退真言曰唵一菩提質多二牟怛跛二合陀夜弭三其手印相合金剛掌發菩提心持誦真言經一七遍隨喜功德者三世如來及諸菩薩為衆生故備無量功德所有功德我當隨喜勸請常住者唯願諸佛久住於世依瑜伽理趣無住涅槃復請轉大法輪遍十方界發勝上願者願諸衆生多饒財寶常當勇施具足智慧常懷大忍樂作善緣得宿命智悲念有情願諸衆生所生之處常獲如是種種勝事次運心供養以心運想水陸諸華無主所攝遍滿虛空盡十方界及以人天上妙塗香雲海燒香燈明幢幡種種鼓樂歌舞妓唱真珠羅網懸諸寶鈴華鬘白拂微妙磬鐸寶繩羅網如意寶樹衣服之雲天諸厨膳上妙香羹宮殿樓閣寶柱莊嚴天諸嚴身頭冠瓔珞如是等瑜祇運心遍滿虛空以至誠心如是供養最為勝上是故行者以決定心而行此法運心供養誦持真言及作手印如上所想悉皆成就運心真言曰唵一薩婆他二缺三嗢怛蘗帝四薩叵二合囉醯麼暗二合五誐誐娜六劍七婆嚩二合引賀引八誦真言七遍即成普通供養其手印相作合金剛掌置於頂上誦此真言經七遍即成就諸供養具次以真言及印護身五處真言曰唵一質多二鉢囉二合底三吠能四迦路弭五誦此真言令住一切如來具足三昧耶能辦一切諸佛事業速得成就尊勝真言修瑜伽五智品第五復次修瑜伽瑜祇者自住妙菩提心故速入觀菩提心智觀菩提心真言曰唵一菩地質多二牟怛簸二合那夜弭三此名發菩提心真言亦名大圓鏡智速令發菩提心初發心時便成正覺即是法身之義次說平等性智真言曰唵一底瑟姹二合二縛折囉二合三誦此真言速令心住不令散亂即是應身之義次說成所作智真言曰唵一拽他二薩囉嚩二合怛他蘗多三娑多二合他痕四次說妙觀察智真言曰唵一娑嚩二合婆嚩二戍入度痕三此名妙觀察智是應身之義亦是後得智法身之義次說方便究竟智真言曰唵一薩囉嚩二合二三謨痕三此名方便究竟智化身之義或進修門中以方便為究竟即是後得智法身之義此明中胎五方安之其五智真言印相以智定二羽外叉合掌為拳直竪二火輪以二地輪亦合二風輪屈各在二火輪背上節去二三分許二大空並竪形如五股金剛以此一印通用五智後乃用大日法界印加持五處即成具足五分法身萬德之身其法界印相以權智各作金剛拳智手執權風幢加持五處便住當心上己身為毗盧遮那如來之身頭上五智佛寶冠即是五頂輪王具五智義便以一切佛頂輪王心印真言加持五處其一切佛頂輪王心真言曰唵一度嚕𤙖二合二𤙖三泮吒四其手印相兩手內相叉為拳竪直二中輪即是此印真言通一切用辨事召請發遣結界護身一切處通用復次說本尊真言曰其印相者兩手外叉合掌為拳曲鉤右風幢即加持五處增益時用或一手作攝召時用又經中所說以兩手合掌以右手大指押左大指上除災時用若降伏念誦時以左押右即是便執數珠合掌頂戴當心上執數珠念誦當一一與本法相應念誦速得成就所求之願除不至心及以惡事却被自損尊勝佛頂修瑜伽本尊真言品第六復次我今略說修本尊真言法每月十五日自誦或遣人誦滿一千八遍能除一切災殃長壽增福或每日三時觀本尊心上圓明中或觀己身為本尊於心上圓明中旋轉安布尊勝真言如字輪形一一字隨本法臨時本色相應放光皆變成為曼荼羅聖衆即是己身為尊勝佛頂法界曼荼羅體其本尊尊勝佛頂真言曰南謨薄伽婆諦一怛㘑二合路迦吉耶反二鉢囉二合底丁以反微室瑟咤二合耶三勃馱耶四薄伽婆帝五怛姪他去六唵七微戍馱耶八娑摩三漫多九嚩皤去娑十薩